name: Build Vite App for Ferozo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '_source/package-lock.json'
          
      - name: Install dependencies
        working-directory: ./_source
        run: npm install
        
      - name: Build project
        working-directory: ./_source
        run: npm run build
        
      - name: Commit build files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Agrega el nuevo index.html, la carpeta assets/ y archivos de la carpeta public
          git add index.html assets/ *.php *.ico *.svg *.txt
          
          # Solo comitear si hay cambios reales en los archivos
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Auto-build React app for Ferozo deployment" && git push)
